<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Joke Generator</title>
    <link rel="stylesheet" href="joke-styles.css">
</head>
<body>
    <div class="container">
        <div class="joke-generator">
            <h1>😄 Joke Generator</h1>
            <p class="subtitle">Get a random joke to brighten your day!</p>

            <div class="joke-category-selector">
                <label for="categorySelect">Select Category:</label>
                <select id="categorySelect">
                    <option value="">Any</option>
                    <option value="general">General</option>
                    <option value="programming">Programming</option>
                    <option value="knock-knock">Knock-Knock</option>
                </select>
            </div>

            <div class="joke-display" id="jokeDisplay">
                <div class="joke-loading">Click the button to load a joke!</div>
            </div>

            <div class="joke-type-display" id="jokeType"></div>

            <button class="generate-btn" id="generateBtn" onclick="generateJoke()">
                Get a Joke 🎭
            </button>

            <div class="joke-actions">
                <button class="action-btn" id="shareBtn" onclick="shareJoke()">
                    📤 Share
                </button>
                <button class="action-btn" id="copyBtn" onclick="copyToClipboard()">
                    📋 Copy
                </button>
            </div>

            <div class="joke-history">
                <h3>Recent Jokes</h3>
                <ul id="historyList"></ul>
                <button class="clear-history-btn" onclick="clearHistory()">Clear History</button>
            </div>
        </div>
    </div>

    <script src="joke-script.js"></script>
</body>
</html>
